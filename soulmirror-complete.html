    // --- UTILITIES ---
    
    function getSunSign(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDate();
      const month = d.getMonth() + 1;
      if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) return "aries";
      if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) return "taurus";
      if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) return "gemini";
      if ((month === 6 && day >= 21) || (month === 7 && day <= 22)) return "cancer";
      if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) return "leo";
      if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) return "virgo";
      if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) return "libra";
      if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) return "scorpio";
      if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) return "sagittarius";
      if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return "capricorn";
      if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) return "aquarius";
      return "pisces";
    }
    
    function checkCrisis(text) {
      const lower = text.toLowerCase();
      return CRISIS_KEYWORDS.some(k => lower.includes(k));
    }
    
    function getMoonPhase() {
      const date = new Date();
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      let c, e, jd, b;
      if (month < 3) { year--; month += 12; }
      c = 365.25 * year;
      e = 30.6 * month;
      jd = c + e + day - 694039.09;
      jd /= 29.5305882;
      b = parseInt(jd);
      jd -= b;
      b = Math.round(jd * 8);
      if (b >= 8) b = 0;
      const phases = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
      return phases[b];
    }

    function generateStoicResponse(input, profile) {
      const themes = {
        stress: { obs: "I observe a mind burdened by the weight of external demands, carrying what is not yours to carry.", dich: "You control your attention and your response. You do not control the chaos around you.", ref: "The obstacle is the way. What blocks you also points the path forward.", prac: "Morning Pause: Before rising tomorrow, ask: 'What within this day is truly mine to carry?'", q: "If you were stripped of every worry about tomorrow, what would you do with today?" },

    function generateNurturingResponse(input, profile) {

    // --- THREE.JS STARFIELD ---
    function Starfield() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        const geometry = new THREE.BufferGeometry();
        const count = 6000;
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i++) {
          positions[i] = (Math.random() - 0.5) * 40;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.03, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, sizeAttenuation: true });
        const stars = new THREE.Points(geometry, material);
        scene.add(stars);
        camera.position.z = 5;
        let animId;
        const animate = () => {
          animId = requestAnimationFrame(animate);
          stars.rotation.x += 0.0003;
          stars.rotation.y += 0.0006;
          renderer.render(scene, camera);
        };
        animate();
        const onResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', onResize);
        return () => {
          cancelAnimationFrame(animId);
          window.removeEventListener('resize', onResize);
          renderer.dispose();
          geometry.dispose();
          material.dispose();
        };
      }, []);
      return <canvas ref={canvasRef} className="star-canvas" />;
    }
    
    // --- MAIN APP ---
    function App() {
      const [scene, setScene] = useState('arrival');
      const [profile, setProfile] = useState(() => {
        try { return JSON.parse(localStorage.getItem('soulmirror_profile') || '{}'); } catch(e) { return {}; }
      });
      const [journal, setJournal] = useState(() => {
        try { return JSON.parse(localStorage.getItem('soulmirror_journal') || '[]'); } catch(e) { return []; }
      });
      const [currentGuide, setCurrentGuide] = useState(null);
      const [sessionId, setSessionId] = useState(null);
      const [crisisActive, setCrisisActive] = useState(false);
      
      const saveProfile = (p) => {
        const final = { ...p, sunSign: p.birthDate ? getSunSign(p.birthDate) : null };
        setProfile(final);
        localStorage.setItem('soulmirror_profile', JSON.stringify(final));
      };
      
      const addJournal = (entry) => {
        const item = { id: Date.now(), date: new Date().toISOString(), ...entry };
        const updated = [item, ...journal];
        setJournal(updated);
        localStorage.setItem('soulmirror_journal', JSON.stringify(updated));
      };
      
      const emotionalWeather = useMemo(() => {
        if (!journal.length) return 'calm';
        const last = journal[0].emotionalWeather || 'calm';
        return last;
      }, [journal]);
      
      const handleCrisis = () => {
        setCrisisActive(true);
        setScene('crisis');
      };
      
      const enterChamber = (guideId) => {
        setCurrentGuide(guideId);
        setSessionId('sess_' + Date.now());
        setScene('chamber');
      };
      
      const enterMirror = () => {
        setSessionId('sess_' + Date.now());
        setScene('mirror');
      };
      
      if (scene === 'arrival') return <Arrival onEnter={() => setScene('onboarding')} />;
      if (scene === 'onboarding') return <Onboarding onComplete={(p) => { saveProfile(p); setScene('hall'); }} />;
      if (scene === 'crisis') return <SafeHarbor onResolve={() => setScene('hall')} profile={profile} />;
      if (scene === 'hall') return <GreatHall profile={profile} emotionalWeather={emotionalWeather} onEnterChamber={enterChamber} onEnterMirror={enterMirror} onJournal={() => setScene('journal')} />;
      if (scene === 'chamber') return <Chamber guideId={currentGuide} profile={profile} onBack={() => setScene('hall')} onCrisis={handleCrisis} onSaveToJournal={addJournal} />;
      if (scene === 'mirror') return <MirrorCouncil profile={profile} onBack={() => setScene('hall')} onCrisis={handleCrisis} onSaveToJournal={addJournal} />;
      if (scene === 'journal') return <SoulJournal entries={journal} onClose={() => setScene('hall')} profile={profile} />;
      return <div>Unknown scene</div>;
    }

    // --- CHAMBER ---
    function Chamber({ guideId, profile, onBack, onCrisis, onSaveToJournal }) {
      const guide = GUIDES[guideId];

      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [typingText, setTypingText] = useState('');
      const bottomRef = useRef(null);
      
      const chamberClass = `chamber-${guideId}`;
      
      useEffect(() => {
        const greeting = `Welcome, seeker. I am the ${guide.name}. ${guideId === 'stoic' ? 'Sit beside the pool. Let us look clearly at what is.' : guideId === 'nurturing' ? 'Come closer to the fire. You are safe here.' : guideId === 'coach' ? 'Step into the forge. We have work to do.' : guideId === 'astrologer' ? 'Look up. The stars have been waiting to speak with you.' : guideId === 'alchemist' ? 'Descend with me. The gold is hidden in the darkness.' : 'The roses are blooming. Sit with me in the twilight.'}`;
        typeMessage(greeting);
        setMessages([{role:'guide', content:greeting}]);
      }, []);
      
      useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, typingText]);
      
      const typeMessage = (text) => {
        setTypingText('');
        let i = 0;
        const interval = setInterval(() => {
          i++;
          setTypingText(text.slice(0, i));
          if (i >= text.length) clearInterval(interval);
        }, 20);
        return () => clearInterval(interval);
      };
      
      const handleSend = () => {
        if (!input.trim() || loading) return;
        const userMsg = input.trim();
        setMessages(prev => [...prev, {role:'seeker', content:userMsg}]);
        setInput('');
        
        if (checkCrisis(userMsg)) {
          onCrisis();
          return;
        }
        
        setLoading(true);
        setTimeout(() => {
          let resp;
          if (guideId === 'stoic') resp = generateStoicResponse(userMsg, profile);
          else if (guideId === 'nurturing') resp = generateNurturingResponse(userMsg, profile);
          else if (guideId === 'coach') resp = generateCoachResponse(userMsg, profile);
          else if (guideId === 'astrologer') resp = generateAstrologerResponse(userMsg, profile);
          else if (guideId === 'alchemist') resp = generateAlchemistResponse(userMsg, profile);
          else resp = generatePoetResponse(userMsg, profile);
          
          const content = resp.content;
          setMessages(prev => [...prev, {role:'guide', content, metadata: resp}]);
          setLoading(false);
          onSaveToJournal({ guideId, guideName: guide.name, query: userMsg, response: content, emotionalWeather: 'calm', entryType: 'reflection' });
          typeMessage(content);
        }, 1200);
      };
      
      return (

                  <div className="text-amber-200/50 text-xs font-body italic">{guide.chamber}</div>
                </div>
              </div>

                <input

                  className="flex-1 bg-black/40 border border-gold/30 rounded-lg px-4 py-3 text-amber-100 placeholder-amber-200/30 focus:outline-none focus:border-gold/60 font-body disabled:opacity-50"
                />
                <button onClick={handleSend} disabled={stage !== 'input'} className="px-6 py-3 bg-gold/20 border border-gold/50 text-amber-100 rounded-lg hover:bg-gold/30 transition-all font-ui uppercase tracking-wider text-sm disabled:opacity-50">Convene</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    
    // --- SAFE HARBOR ---
    function SafeHarbor({ onResolve, profile }) {
      return (
        <div className="relative w-full min-h-screen crisis-blue overflow-hidden flex items-center justify-center">
          <div className="absolute inset-0 bg-blue-950/40" />
          <div className="relative z-10 max-w-2xl mx-auto px-6 py-12 text-center">
            <div className="w-20 h-20 mx-auto mb-8 rounded-full border-2 border-blue-300/30 flex items-center justify-center bg-blue-900/30 backdrop-blur-md">
              <span className="text-4xl">🌊</span>
            </div>
            <h2 className="text-3xl md:text-4xl font-serif text-blue-100 mb-6">Safe Harbor</h2>
            <div className="bg-blue-900/30 border border-blue-400/30 rounded-xl p-6 md:p-8 text-left space-y-4 font-body text-blue-100/90 leading-relaxed">
              <p>I hear you. And I want you to know: you are not alone right now. What you're carrying is heavy, and you deserve support that goes beyond what I can offer in this space.</p>
              <p className="font-ui text-sm uppercase tracking-wider text-blue-200/80 mt-6 mb-2">If you are in immediate danger:</p>
              <div className="space-y-2 text-sm">
                <p>• <strong>United States:</strong> Call or text <span className="text-blue-200 font-bold">988</span> (Suicide & Crisis Lifeline)</p>
                <p>• <strong>United Kingdom:</strong> Call 111 or text SHOUT to 85258</p>
                <p>• <strong>Canada:</strong> Call or text 988</p>
                <p>• <strong>Australia:</strong> Call 13 11 14 (Lifeline)</p>
                <p>• <strong>International:</strong> <a href="https://findahelpline.com" target="_blank" className="text-blue-300 underline">findahelpline.com</a></p>
              </div>
              <p className="mt-6 italic text-blue-200/70">These are real people, right now, who can help. You deserve that help.</p>
              <p>I'm here with you in this moment. Take a breath with me. In... and out. You've survived every difficult moment up until now. You can survive this one too. One breath at a time.</p>
            </div>
            <button onClick={onResolve} className="mt-8 px-8 py-3 border border-blue-300/50 text-blue-100 hover:bg-blue-400/10 transition-all rounded-full tracking-widest uppercase text-sm font-ui">Return to the Hall</button>
          </div>
        </div>
      );
    }
    
    // --- SOUL JOURNAL ---
    function SoulJournal({ entries, onClose, profile }) {
      const [filter, setFilter] = useState('all');
      const filtered = filter === 'all' ? entries : entries.filter(e => e.entryType === filter || e.guideId === filter);
      
      return (
        <div className="relative w-full min-h-screen bg-obsidian overflow-auto">
          <div className="relative z-10 max-w-4xl mx-auto px-4 py-8 md:py-12">
            <div className="flex items-center justify-between mb-8">
              <h2 className="text-3xl md:text-4xl font-serif text-amber-100">Soul Journal</h2>
              <button onClick={onClose} className="text-amber-200/70 hover:text-amber-100 text-sm uppercase tracking-widest">Close</button>
            </div>
            
            <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
              {['all', 'reflection', 'stoic', 'nurturing', 'coach', 'astrologer', 'alchemist', 'poet', 'council'].map(f => (
                <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-full text-xs uppercase tracking-wider border whitespace-nowrap ${filter === f ? 'border-gold bg-gold/20 text-amber-100' : 'border-white/10 text-amber-200/50 hover:border-white/30'}`}>
                  {f === 'all' ? 'All Entries' : GUIDES[f]?.name || 'Council'}
                </button>
              ))}
            </div>
            
            <div className="space-y-4">
              {filtered.length === 0 && (
                <div className="text-center py-20 text-amber-200/40 font-body italic">The pages are blank, awaiting your story.</div>
              )}
              {filtered.map(entry => (
                <div key={entry.id} className="journal-page rounded-xl p-6 shadow-lg border border-white/5">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">{GUIDES[entry.guideId]?.symbol || '🪞'}</span>
                      <span className="font-serif text-amber-900 font-semibold">{entry.guideName || 'Unknown Guide'}</span>
                    </div>
                    <span className="text-xs text-stone-500 font-ui">{new Date(entry.date).toLocaleDateString()} • {new Date(entry.date).toLocaleTimeString()}</span>
                  </div>
                  <div className="text-sm text-stone-600 font-ui uppercase tracking-wider mb-2">Seeker's Question:</div>
                  <div className="font-body italic text-stone-800 mb-4 pl-3 border-l-2 border-stone-300">{entry.query}</div>
                  <div className="text-sm text-stone-600 font-ui uppercase tracking-wider mb-2">Reflection:</div>
                  <div className="font-body text-stone-800 whitespace-pre-wrap leading-relaxed">{entry.response}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
